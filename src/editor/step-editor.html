<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step Editor</title>
    <link href="../output.css" rel="stylesheet">
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>

<body class="bg-slate-900 text-slate-200 h-screen flex flex-col font-sans overflow-hidden">

    <header class="bg-slate-800 border-b border-slate-700 px-5 py-3 flex items-center gap-4 shrink-0">
        <h1 class="text-sm font-bold text-indigo-400 tracking-wide">Step Editor</h1>
        <span id="step-breadcrumb" class="text-sm text-slate-300 font-mono"></span>
        <span id="step-dirty" class="text-xs text-amber-400 font-bold ml-auto"></span>
        <div class="flex items-center gap-1 text-xs text-slate-500">
            <button id="editor-zoom-out"
                class="px-2 py-1 bg-slate-700 hover:bg-slate-600 text-slate-200 rounded font-bold"
                title="Decrease font size (⌘-)">A−</button>
            <button id="editor-zoom-label"
                class="px-1 text-slate-500 hover:text-slate-200 font-mono"
                title="Reset zoom (⌘0)">100%</button>
            <button id="editor-zoom-in"
                class="px-2 py-1 bg-slate-700 hover:bg-slate-600 text-slate-200 rounded font-bold"
                title="Increase font size (⌘+)">A+</button>
        </div>
        <button id="step-save"
            class="px-3 py-1 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-40 disabled:cursor-not-allowed text-white rounded text-xs font-bold"
            title="Save all dirty files in main editor (⌘⇧S)" disabled>Save All</button>
        <span id="step-status" class="text-xs italic text-slate-500"></span>
    </header>

    <div id="step-banner" class="hidden px-5 py-3 bg-amber-900/40 border-b border-amber-700/50 text-sm text-amber-300"></div>

    <main id="step-form" class="flex-1 overflow-y-auto p-6"></main>

    <!-- Shared engine layer (DataLoader is used as a fallback only; primary path is snapshot from main editor) -->
    <script src="../engine/dataLoader.js"></script>
    <script src="../engine/dataRegistry.js"></script>

    <!-- Reused editor components -->
    <script src="./components/ConditionEditor.js"></script>
    <script src="./components/ChangesEditor.js"></script>
    <script src="./components/DialogueEditor.js"></script>
    <script src="./components/ConnectionEditor.js"></script>
    <script src="./components/ProceedEditor.js"></script>

    <!-- Reused helpers -->
    <script src="./panels/PanelHelpers.js"></script>

    <!-- Editor core (state, sync, validation stub for parity) -->
    <script src="./editorSync.js"></script>
    <script src="./editorState.js"></script>
    <script src="./editorZoom.js"></script>

    <!-- Pop-out boot -->
    <script src="./stepEditor.js"></script>
</body>

</html>
